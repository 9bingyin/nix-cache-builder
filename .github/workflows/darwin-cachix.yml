name: Darwin Cachix

on:
  push:
    branches:
      - main
      - master
    paths:
      - "ci.nix"
      - "flake.lock"
      - "flake.nix"
      - "bun.lock"
      - "package.json"
      - "tsconfig.json"
      - "packages/**"
      - "scripts/**"
      - ".github/workflows/darwin-cachix.yml"
  schedule:
    # 每天 04:00 Asia/Shanghai (UTC+8) = 20:00 UTC
    - cron: "0 20 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: darwin-cachix-${{ github.ref }}
  cancel-in-progress: false

env:
  NIX_CONFIG: "experimental-features = nix-command flakes\naccept-flake-config = true"
  NIXPKGS_ALLOW_UNFREE: "1"

jobs:
  plan-darwin:
    if: ${{ vars.CACHIX_NAME != '' }}
    runs-on: ubuntu-latest
    outputs:
      has_missing: ${{ steps.find.outputs.has_missing }}
      matrix: ${{ steps.find.outputs.matrix }}

    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - uses: samueldr/lix-gha-installer-action@v2026-06-15
        with:
          github_access_token: ${{ github.token }}
          extra_nix_config: |
            extra-substituters = https://9bingyin.cachix.org https://nix-community.cachix.org https://cache.numtide.com
            extra-trusted-public-keys = 9bingyin.cachix.org-1:uXB+kYLEeHo6kpX8NIZtRwwPozYR/JRNRMeFaObkvDo= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= niks3.numtide.com-1:DTx8wZduET09hRmMtKdQDxNNthLQETkc/yaX7M4qK0g=

      - uses: cachix/cachix-action@v17
        with:
          name: ${{ vars.CACHIX_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Typecheck scripts
        run: bun install --frozen-lockfile && bun run typecheck

      - id: find
        name: Find uncached ci.nix entries
        run: bun run scripts/find-uncached.ts

  build-darwin:
    needs: plan-darwin
    if: ${{ needs.plan-darwin.outputs.has_missing == 'true' }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJSON(needs.plan-darwin.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v7

      - uses: samueldr/lix-gha-installer-action@v2026-06-15
        with:
          github_access_token: ${{ github.token }}
          extra_nix_config: |
            extra-substituters = https://9bingyin.cachix.org https://nix-community.cachix.org https://cache.numtide.com
            extra-trusted-public-keys = 9bingyin.cachix.org-1:uXB+kYLEeHo6kpX8NIZtRwwPozYR/JRNRMeFaObkvDo= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= niks3.numtide.com-1:DTx8wZduET09hRmMtKdQDxNNthLQETkc/yaX7M4qK0g=

      - uses: cachix/cachix-action@v17
        with:
          name: ${{ vars.CACHIX_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          set -euo pipefail

          nix run .#nix-fast-build -- \
            --file ci.nix \
            -A '${{ matrix.attr }}' \
            --pure \
            --systems aarch64-darwin \
            --skip-cached \
            --no-nom \
            --no-link \
            --cachix-cache "${{ vars.CACHIX_NAME }}"
