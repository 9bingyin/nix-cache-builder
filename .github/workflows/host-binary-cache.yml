name: Host Binary Cache

on:
  push:
    branches:
      - main
      - master
    paths:
      - "flake.lock"
      - "flake.nix"
      - "scripts/**"
      - ".github/workflows/host-binary-cache.yml"
  repository_dispatch:
    types:
      - flake-updated
  schedule:
    # 每天 04:00 Asia/Shanghai (UTC+8) = 20:00 UTC
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      hosts:
        description: "逗号分隔的 configurations 主机名；留空表示全部"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: host-binary-cache-${{ github.ref }}
  cancel-in-progress: false

env:
  FLAKE_REPOSITORY: 9bingyin/flake
  FLAKE_CHECKOUT_PATH: flake-config
  NIX_CONFIG: |
    experimental-features = nix-command flakes
    accept-flake-config = true
  NIXPKGS_ALLOW_UNFREE: "1"
  # Cachix 与 niks3 都用于下载和构建前的缓存探测。
  CACHE_URLS: https://${{ vars.CACHIX_NAME }}.cachix.org https://cache.bingyin.org
  CACHE_TRUSTED_PUBLIC_KEYS: 9bingyin.cachix.org-1:uXB+kYLEeHo6kpX8NIZtRwwPozYR/JRNRMeFaObkvDo= cache.bingyin.org-1:PU5qCuJfhYPKSIRdOMCndVB6Dn9rRRIRVZAnG2uAPSI=
  NIKS3_SERVER: https://niks3.bingyin.org
  # 查缓存 HTTP 并发；matrix 任务并行见各 job 的 max-parallel
  CACHE_PROBE_CONCURRENCY: "8"

jobs:
  discover-hosts:
    if: ${{ vars.CACHIX_NAME != '' }}
    runs-on: ubuntu-latest
    outputs:
      has_hosts: ${{ steps.discover.outputs.has_hosts }}
      matrix: ${{ steps.discover.outputs.matrix }}
      flake_rev: ${{ steps.discover.outputs.flake_rev }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/checkout@v7
        with:
          repository: ${{ env.FLAKE_REPOSITORY }}
          token: ${{ secrets.FLAKE_REPO_TOKEN }}
          path: ${{ env.FLAKE_CHECKOUT_PATH }}

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.FLAKE_REPO_TOKEN }}
          extra_nix_config: |
            extra-substituters = ${{ env.CACHE_URLS }} https://nix-community.cachix.org https://cache.numtide.com
            extra-trusted-public-keys = ${{ env.CACHE_TRUSTED_PUBLIC_KEYS }} nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= niks3.numtide.com-1:DTx8wZduET09hRmMtKdQDxNNthLQETkc/yaX7M4qK0g=

      - uses: oven-sh/setup-bun@v2

      - id: discover
        env:
          FLAKE_REF: ./${{ env.FLAKE_CHECKOUT_PATH }}
          CONFIG_ROOTS: darwinConfigurations,nixosConfigurations
          HOSTS: ${{ inputs.hosts }}
          # 不改 flake 时，非默认平台主机可在仓库变量中显式指定，
          # 例如 {"darwinConfigurations.Legacy-Mac":"x86_64-darwin"}。
          HOST_SYSTEM_OVERRIDES: ${{ vars.HOST_SYSTEM_OVERRIDES }}
          HOST_RUNNER_OVERRIDES: ${{ vars.HOST_RUNNER_OVERRIDES }}
          AARCH64_DARWIN_RUNNER: ${{ vars.AARCH64_DARWIN_RUNNER || 'macos-15' }}
          X86_64_DARWIN_RUNNER: ${{ vars.X86_64_DARWIN_RUNNER || 'macos-15-intel' }}
          X86_64_LINUX_RUNNER: ${{ vars.X86_64_LINUX_RUNNER || 'ubuntu-24.04' }}
          AARCH64_LINUX_RUNNER: ${{ vars.AARCH64_LINUX_RUNNER || 'ubuntu-24.04-arm' }}
        run: bun run scripts/discover-hosts.ts

  export-packages:
    needs: discover-hosts
    if: ${{ needs.discover-hosts.outputs.has_hosts == 'true' }}
    strategy:
      fail-fast: false
      max-parallel: 4 # 最多同时 export 4 台主机
      matrix: ${{ fromJSON(needs.discover-hosts.outputs.matrix) }}
    name: Export ${{ matrix.root }}.${{ matrix.host }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/checkout@v7
        with:
          repository: ${{ env.FLAKE_REPOSITORY }}
          token: ${{ secrets.FLAKE_REPO_TOKEN }}
          path: ${{ env.FLAKE_CHECKOUT_PATH }}
          ref: ${{ matrix.flakeRev }}

      # 此时只知道主机名称和目标平台；nix.package 与主机缓存设置在原生
      # runner 完整求值配置后由 export-packages 导出，故 bootstrap 统一使用 Nix。
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.FLAKE_REPO_TOKEN }}
          extra_nix_config: |
            extra-substituters = ${{ env.CACHE_URLS }} https://nix-community.cachix.org https://cache.numtide.com
            extra-trusted-public-keys = ${{ env.CACHE_TRUSTED_PUBLIC_KEYS }} nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= niks3.numtide.com-1:DTx8wZduET09hRmMtKdQDxNNthLQETkc/yaX7M4qK0g=

      - uses: oven-sh/setup-bun@v2

      - env:
          FLAKE_REF: ./${{ env.FLAKE_CHECKOUT_PATH }}
          HOST_JSON: ${{ toJSON(matrix) }}
          PACKAGE_EXPORT_PATH: package-export/${{ matrix.matrixKey }}.json
        run: bun run scripts/export-packages.ts

      - uses: actions/upload-artifact@v7
        with:
          name: package-export-${{ matrix.matrixKey }}
          path: package-export/${{ matrix.matrixKey }}.json
          if-no-files-found: error

  plan-builds:
    needs: export-packages
    runs-on: ubuntu-latest
    outputs:
      has_builds: ${{ steps.plan.outputs.has_builds }}
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v8
        with:
          pattern: package-export-*
          path: package-exports
          merge-multiple: true

      - id: plan
        env:
          PACKAGE_EXPORT_DIR: package-exports
          CACHE_URLS: ${{ env.CACHE_URLS }}
          CACHIX_NAME: ${{ vars.CACHIX_NAME }}
          CACHE_PROBE_CONCURRENCY: ${{ env.CACHE_PROBE_CONCURRENCY }}
        run: bun run scripts/plan-builds.ts

  build-packages:
    needs: plan-builds
    if: ${{ needs.plan-builds.outputs.has_builds == 'true' }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      max-parallel: 4 # 最多同时 build 4 个包
      matrix: ${{ fromJSON(needs.plan-builds.outputs.matrix) }}
    name: Build ${{ matrix.packageName }} (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/checkout@v7
        with:
          repository: ${{ env.FLAKE_REPOSITORY }}
          token: ${{ secrets.FLAKE_REPO_TOKEN }}
          path: ${{ env.FLAKE_CHECKOUT_PATH }}
          ref: ${{ matrix.flakeRev }}

      - if: ${{ matrix.installer == 'lix' }}
        uses: canidae-solutions/lix-quick-install-action@v4
        with:
          github_access_token: ${{ secrets.FLAKE_REPO_TOKEN }}
          lix_conf: |
            extra-substituters = ${{ env.CACHE_URLS }} ${{ matrix.extraSubstituters }}
            extra-trusted-public-keys = ${{ env.CACHE_TRUSTED_PUBLIC_KEYS }} ${{ matrix.extraTrustedPublicKeys }}

      - if: ${{ matrix.installer == 'nix' }}
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.FLAKE_REPO_TOKEN }}
          extra_nix_config: |
            extra-substituters = ${{ env.CACHE_URLS }} ${{ matrix.extraSubstituters }}
            extra-trusted-public-keys = ${{ env.CACHE_TRUSTED_PUBLIC_KEYS }} ${{ matrix.extraTrustedPublicKeys }}

      - env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
          CACHIX_NAME: ${{ vars.CACHIX_NAME }}
          PACKAGE_ATTR_JSON: ${{ matrix.packageAttrJson }}
          FLAKE_ATTR: ${{ matrix.flakeAttr }}
          HOST_SYSTEM: ${{ matrix.system }}
          EXTRA_SUBSTITUTERS: ${{ env.CACHE_URLS }} ${{ matrix.extraSubstituters }}
          EXTRA_TRUSTED_PUBLIC_KEYS: ${{ env.CACHE_TRUSTED_PUBLIC_KEYS }} ${{ matrix.extraTrustedPublicKeys }}
        run: |
          set -euo pipefail

          nix profile install nixpkgs#cachix
          export PATH="$HOME/.nix-profile/bin:$PATH"

          # GitHub OIDC token 的有效期较短；niks3 会按需重读此文件，因此在构建期间定期刷新。
          umask 077
          token_file="$(mktemp)"
          refresh_pid=""
          cleanup() {
            if [[ -n "$refresh_pid" ]]; then
              kill "$refresh_pid" 2>/dev/null || true
            fi
            rm -f "$token_file" "${token_file}.new"
          }
          trap cleanup EXIT
          refresh_niks3_token() {
            if ! curl --fail --silent --show-error \
              -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https%3A%2F%2Fniks3.bingyin.org" \
              | jq --exit-status --raw-output '.value' >"${token_file}.new"; then
              rm -f "${token_file}.new"
              return 1
            fi
            mv "${token_file}.new" "$token_file"
          }
          refresh_niks3_token
          (
            while sleep 180; do
              until refresh_niks3_token; do
                echo "warning: failed to refresh niks3 OIDC token; retrying in 15 seconds" >&2
                sleep 15
              done
            done
          ) &
          refresh_pid=$!
          export NIKS3_AUTH_TOKEN_FILE="$token_file"

          package_selector="$(< scripts/host-packages.nix)"
          args=(
            --flake "./${FLAKE_CHECKOUT_PATH}#${FLAKE_ATTR}"
            --select "host: { ${PACKAGE_ATTR_JSON} = builtins.getAttr ${PACKAGE_ATTR_JSON} ((${package_selector}) host); }"
            --systems "${HOST_SYSTEM}"
            --skip-cached
            --no-nom
            --no-link
            --cachix-cache "${CACHIX_NAME}"
            --niks3-server "${NIKS3_SERVER}"
          )

          if [[ -n "${EXTRA_SUBSTITUTERS}" ]]; then
            args+=(--option substituters "${EXTRA_SUBSTITUTERS}")
          fi
          if [[ -n "${EXTRA_TRUSTED_PUBLIC_KEYS}" ]]; then
            args+=(--option trusted-public-keys "${EXTRA_TRUSTED_PUBLIC_KEYS}")
          fi

          nix run .#nix-fast-build -- "${args[@]}"
